services:
  postgres:
    image: postgres:16-alpine
    container_name: insider-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: insider-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:latest
    container_name: insider-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/init-kafka.sh:/init-kafka.sh
    command: ["/bin/bash", "/init-kafka.sh"]

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: insider-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: insider-prometheus
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: insider-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insider-api
    command: ["api"]
    environment:
      API_PORT: ":8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/notifications?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      WEBHOOK_URL: "${WEBHOOK_URL:-https://webhook.site/test}"
      JAEGER_ENDPOINT: "http://jaeger:4318/v1/traces"
      SERVICE_NAME: "insider-one-notification"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insider-worker
    command: ["worker"]
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/notifications?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      WEBHOOK_URL: "${WEBHOOK_URL:-https://webhook.site/test}"
      RATE_LIMIT_PER_SEC: "100"
      MAX_RETRIES: "3"
      BASE_RETRY_DELAY: "5s"
      JAEGER_ENDPOINT: "http://jaeger:4318/v1/traces"
      SERVICE_NAME: "insider-one-notification"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: insider-swagger
    environment:
      SWAGGER_JSON: /api/openapi.yaml
    volumes:
      - ./api/openapi.yaml:/api/openapi.yaml
    ports:
      - "8081:8080"

  krakend:
    image: devopsfaith/krakend:2.6
    container_name: insider-krakend
    volumes:
      - ./krakend.json:/etc/krakend/krakend.json
    ports:
      - "8000:8000"
    depends_on:
      - api
    command: ["run", "-c", "/etc/krakend/krakend.json"]

volumes:
  pgdata:
