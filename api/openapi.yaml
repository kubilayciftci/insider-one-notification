openapi: 3.0.3
info:
  title: Insider One Notification API
  description: Event-driven notification delivery system supporting SMS, Email, and Push channels.
  version: 1.0.0
  contact:
    name: Kubilay Ciftci
    email: ciftcikubi@gmail.com

servers:
  - url: http://localhost:8000/api/v1
    description: Local (via KrakenD gateway)
  - url: http://localhost:8080/api/v1
    description: Direct API access

paths:
  /notifications:
    post:
      summary: Create a notification
      operationId: createNotification
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationRequest"
      responses:
        "202":
          description: Notification accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate idempotency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List notifications with filters
      operationId: listNotifications
      tags: [Notifications]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, queued, processing, delivered, failed, cancelled]
        - name: channel
          in: query
          schema:
            type: string
            enum: [sms, email, push]
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"

  /notifications/batch:
    post:
      summary: Create a batch of notifications
      operationId: createBatch
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatchRequest"
      responses:
        "202":
          description: Batch accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "400":
          description: Validation error

  /notifications/{id}:
    get:
      summary: Get notification by ID
      operationId: getNotification
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"
        "404":
          description: Notification not found

    delete:
      summary: Cancel a pending notification
      operationId: cancelNotification
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Notification cancelled
        "404":
          description: Notification not found
        "409":
          description: Notification cannot be cancelled

  /notifications/batch/{batchId}:
    get:
      summary: Get notifications by batch ID
      operationId: getByBatchId
      tags: [Notifications]
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Batch notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [System]
      responses:
        "200":
          description: Service is healthy

components:
  schemas:
    CreateNotificationRequest:
      type: object
      required: [recipient, channel, content]
      properties:
        recipient:
          type: string
          example: "+905551234567"
        channel:
          type: string
          enum: [sms, email, push]
        content:
          type: string
          example: "Your verification code is 123456"
        priority:
          type: string
          enum: [high, normal, low]
          default: normal
        idempotency_key:
          type: string
          example: "unique-key-abc123"
        payload:
          type: object
          additionalProperties: true

    CreateBatchRequest:
      type: object
      required: [notifications]
      properties:
        notifications:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/CreateNotificationRequest"

    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        batch_id:
          type: string
          format: uuid
        recipient:
          type: string
        channel:
          type: string
        content:
          type: string
        priority:
          type: string
        status:
          type: string
          enum: [pending, queued, processing, delivered, failed, cancelled]
        retry_count:
          type: integer
        idempotency_key:
          type: string
        payload:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BatchResponse:
      type: object
      properties:
        batch_id:
          type: string
          format: uuid
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/NotificationResponse"
        count:
          type: integer

    ListResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/NotificationResponse"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        trace_id:
          type: string
