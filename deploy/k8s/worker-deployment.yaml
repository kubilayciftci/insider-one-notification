apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
  namespace: insider
  labels:
    app: notification-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-worker
  template:
    metadata:
      labels:
        app: notification-worker
    spec:
      containers:
        - name: worker
          image: insider-one-notification:latest
          command: ["worker"]
          envFrom:
            - configMapRef:
                name: notification-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: database-url
            - name: WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: webhook-url
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
