apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: insider
  labels:
    app: notification-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
        - name: api
          image: insider-one-notification:latest
          command: ["api"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: notification-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: database-url
            - name: WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: webhook-url
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
