apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insider-one-notification
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubilayciftci/insider-one-notification.git
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: insider
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
