apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: insider
data:
  API_PORT: ":8080"
  KAFKA_BROKERS: "kafka-headless.insider.svc.cluster.local:9092"
  RATE_LIMIT_PER_SEC: "100"
  MAX_RETRIES: "3"
  BASE_RETRY_DELAY: "5s"
  JAEGER_ENDPOINT: "http://jaeger-collector.observability.svc.cluster.local:4318/v1/traces"
  SERVICE_NAME: "insider-one-notification"
